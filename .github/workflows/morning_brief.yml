name: Morning Health Brief

on:
  schedule:
    # 10h30 Shanghai (UTC+8) = 02h30 UTC. Lundi-vendredi uniquement.
    # ⚠️ Au retour en France (UTC+2 été), passer à '30 8 * * 1-5' pour 10h30 locale.
    - cron: '30 2 * * 1-5'
  workflow_dispatch:   # bouton "Run workflow" manuel dans l'onglet Actions

permissions:
  contents: write      # nécessaire pour committer historique.json

concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  health-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'agent
        env:
          # Auth Garmin : le token (si défini) est prioritaire et évite le rate-limit 429.
          # Sinon, fallback automatique sur email/password.
          GARMIN_TOKEN_BASE64: ${{ secrets.GARMIN_TOKEN_BASE64 }}
          GARMIN_EMAIL:        ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:     ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_KEY:       ${{ secrets.ANTHROPIC_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python garmin_fetch.py

      - name: Sauvegarder l'historique dans le repo
        if: always()
        run: |
          git config user.name  "Garmin Health Agent"
          git config user.email "agent@users.noreply.github.com"
          git add historique.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "📊 Historique $(date +%Y-%m-%d)"
            git push
          else
            echo "Pas de changement d'historique à committer"
          fi
