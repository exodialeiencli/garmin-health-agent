name: Telegram Listener

on:
  schedule:
    # Polling toutes les 5 min (granularité minimale fiable de GitHub Actions).
    # En pratique GitHub peut décaler de quelques minutes en cas de charge — acceptable.
    - cron: '*/5 * * * *'
  workflow_dispatch:   # bouton manuel pour tester

permissions:
  contents: write      # pour committer telegram_state.json + historique.json

concurrency:
  group: telegram-listener
  cancel-in-progress: false   # on ne coupe pas un poll en cours (évite de perdre l'offset)

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer dépendances
        run: pip install requests

      - name: Écouter Telegram
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GH_REPO:           ${{ github.repository }}
        run: python telegram_listener.py

      - name: Sauvegarder l'état (offset + feedbacks)
        if: always()
        run: |
          git config user.name  "Telegram Listener"
          git config user.email "listener@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add telegram_state.json historique.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Listener state $(date +%Y-%m-%dT%H:%M)"
            git push
          else
            echo "Rien a committer"
          fi
